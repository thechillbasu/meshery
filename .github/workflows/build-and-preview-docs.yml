name: Build and Preview Docs

on:
  pull_request_target:
    branches: [master]
    types: [opened, synchronize, reopened, closed]
    paths:
      - '!**'
      - 'docs/**'
      - '.github/workflows/build-and-preview-docs.yml'
      - 'mesheryctl/doc/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-and-deploy-preview:
    runs-on: ubuntu-24.04
    env:
      HUGO_VERSION: 0.157.0
      PREVIEW_RETENTION_LIMIT: 6

    steps:
      - name: Checkout PR code
        if: github.event.action != 'closed'
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Checkout for cleanup
        if: github.event.action == 'closed'
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Install Hugo CLI
        if: github.event.action != 'closed'
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install dart-sass
        if: github.event.action != 'closed'
        run: |
          sudo snap install dart-sass

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: |
          cd docs
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

      - name: Build PR preview
        if: github.event.action != 'closed'
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          HUGO_PREVIEW: "true"
        run: |
          make docs-build-production BASE_URL="/"
          find docs/public -maxdepth 1 -type d -name 'v0.*' -exec rm -rf {} +
          cat > docs/public/robots.txt <<'EOF'
          User-agent: *
          Disallow: /
          EOF

      - name: Deploy PR preview
        if: github.event.action != 'closed'
        uses: rossjrw/pr-preview-action@v1.6.3
        with:
          source-dir: ./docs/public
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          comment: false

      - name: Checkout gh-pages for preview retention
        if: github.event.action != 'closed'
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0
          path: gh-pages-maintenance

      - name: Prune old PR previews
        if: github.event.action != 'closed'
        run: |
          cd gh-pages-maintenance
          mkdir -p pr-preview

          mapfile -t previews < <(
            while IFS= read -r preview; do
              timestamp="$(git log -1 --format=%ct -- "pr-preview/$preview" 2>/dev/null || echo 0)"
              printf '%s %s\n' "$timestamp" "$preview"
            done < <(find pr-preview -mindepth 1 -maxdepth 1 -type d -name 'pr-*' -printf '%f\n') \
              | sort -nr \
              | awk '{print $2}'
          )

          if (( ${#previews[@]} <= PREVIEW_RETENTION_LIMIT )); then
            exit 0
          fi

          for preview in "${previews[@]:PREVIEW_RETENTION_LIMIT}"; do
            rm -rf "pr-preview/$preview"
          done

          if git diff --quiet -- pr-preview; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pr-preview
          git commit -m "Prune old PR previews"
          git push

      - name: Comment PR with Preview URL
        if: github.event.action != 'closed'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            🚀 **Preview deployment for PR #${{ github.event.pull_request.number }}**

            🌐 **Preview URL**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}/

            _This preview will be updated automatically when you push new commits to this PR._
      - name: Cleanup PR preview on close
        if: github.event.action == 'closed'
        uses: rossjrw/pr-preview-action@v1.6.3
        with:
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
